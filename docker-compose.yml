services:
  db:
    image: postgres:16-alpine
    container_name: postgres_container
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_storage:/var/lib/postgresql/data
    ports:
      - "5435:5432"
  n8n:
    build: .
    container_name: n8n_container
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=${POSTGRES_NON_ROOT_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_NON_ROOT_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      - N8N_PROTOCOL=${N8N_PROTOCOL}
      - NODE_ENV=${NODE_ENV}
      - WEBHOOK_URL=${WEBHOOK_URL}
      # Security override to allow using $env in nodes
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      # API Keys injected from .env
      - GOOGLE_PLACES_API_KEY=${GOOGLE_API_KEY}
      - APIFY_API_KEY=${APIFY_API_KEY}
    links:
      - db
    volumes:
      - n8n_storage:/home/node/.n8n
      # Map current project folder (.) to the container path where n8n expects it
      - .:/home/node/project_workflows/maps_scraper
    depends_on:
      - db

volumes:
  n8n_storage:
  db_storage:
